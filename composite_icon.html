<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
        }

        canvas {
            width: 640px;
            height: 640px;
        }
    </style>
</head>

<body>
    <canvas id="canvas" width="640" height="640"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const imgA = new Image();
        const imgB = new Image();

        imgA.src = 'file:///Users/joseph/.gemini/antigravity/brain/fa4e8167-b646-456d-ae02-627d87076563/viange_pwa_icon_dark_vibrant_1770515073204.png';
        imgB.src = 'file:///Users/joseph/.gemini/antigravity/brain/fa4e8167-b646-456d-ae02-627d87076563/viange_pwa_icon_large_text_eeg_1770515198319.png';

        let loaded = 0;
        const onLoaded = () => {
            loaded++;
            if (loaded === 2) {
                ctx.drawImage(imgB, 0, 0);
                // Use screen to blend the glowing text from A onto B
                ctx.globalCompositeOperation = 'screen';
                ctx.drawImage(imgA, 0, 0);
                document.body.classList.add('ready');
            }
        };
        imgA.onload = onLoaded;
        imgB.onload = onLoaded;
    </script>
</body>

</html>
